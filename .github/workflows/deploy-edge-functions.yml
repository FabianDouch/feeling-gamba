name: Deploy Edge Functions

on:
  workflow_dispatch:
    inputs:
      run_smoke_checks:
        description: Run non-mutating OPTIONS checks after deploy
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: deploy-edge-functions-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Edge Functions
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate required secrets
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN" || (echo "SUPABASE_ACCESS_TOKEN is required" && exit 1)
          test -n "$SUPABASE_PROJECT_REF" || (echo "SUPABASE_PROJECT_REF is required" && exit 1)

      - name: Deploy refresh-current-promotions
        run: npx supabase functions deploy refresh-current-promotions --project-ref "$SUPABASE_PROJECT_REF" --no-verify-jwt --use-api

      - name: Deploy refresh-current-predictions
        run: npx supabase functions deploy refresh-current-predictions --project-ref "$SUPABASE_PROJECT_REF" --no-verify-jwt --use-api

      - name: Deploy refresh-race-days-and-insights
        run: npx supabase functions deploy refresh-race-days-and-insights --project-ref "$SUPABASE_PROJECT_REF" --no-verify-jwt --use-api

      - name: Deploy request-track-race-odds
        run: npx supabase functions deploy request-track-race-odds --project-ref "$SUPABASE_PROJECT_REF" --no-verify-jwt --use-api

      - name: Smoke check Edge Function routes
        if: ${{ inputs.run_smoke_checks }}
        run: |
          for function_name in \
            refresh-current-promotions \
            refresh-current-predictions \
            refresh-race-days-and-insights \
            request-track-race-odds
          do
            curl -fsS -X OPTIONS "https://${SUPABASE_PROJECT_REF}.supabase.co/functions/v1/${function_name}" >/dev/null
          done
