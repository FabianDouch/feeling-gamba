name: Overnight Race Data Refresh

on:
  schedule:
    # 06:10 NZST / 07:10 NZDT. GitHub cron uses UTC.
    - cron: "10 18 * * *"
  workflow_dispatch:
    inputs:
      lookback_days:
        description: Completed Auckland race dates to refresh, ending yesterday
        required: true
        default: "4"
        type: string
      dry_run:
        description: Resolve the refresh window without writing race data
        required: false
        default: false
        type: boolean
      force_refresh:
        description: Override an active refresh lock
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: overnight-race-refresh
  cancel-in-progress: false

jobs:
  refresh:
    name: Refresh Race Days And Predictions
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      DRY_RUN: ${{ github.event.inputs.dry_run }}
      FORCE_REFRESH: ${{ github.event.inputs.force_refresh }}
      LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days }}
      RACE_DAY_REFRESH_ADMIN_TOKEN: ${{ secrets.RACE_DAY_REFRESH_ADMIN_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

    steps:
      - name: Validate required inputs and secrets
        run: |
          test -n "$SUPABASE_PROJECT_REF" || (echo "SUPABASE_PROJECT_REF is required" && exit 1)
          test -n "$RACE_DAY_REFRESH_ADMIN_TOKEN" || (echo "RACE_DAY_REFRESH_ADMIN_TOKEN is required" && exit 1)

          lookback_days="${LOOKBACK_DAYS:-4}"

          case "$lookback_days" in
            ''|*[!0-9]*)
              echo "lookback_days must be a positive integer"
              exit 1
              ;;
          esac

          if [ "$lookback_days" -lt 1 ] || [ "$lookback_days" -gt 14 ]; then
            echo "lookback_days must be between 1 and 14"
            exit 1
          fi

      - name: Invoke hosted race-day refresh
        run: |
          set -o pipefail

          lookback_days="${LOOKBACK_DAYS:-4}"
          dry_run="${DRY_RUN:-false}"
          force_refresh="${FORCE_REFRESH:-false}"
          today="$(TZ=Pacific/Auckland date +%F)"
          start_epoch="$(TZ=Pacific/Auckland date -d "${today} - ${lookback_days} days" +%s)"
          countries="NZ AUS"
          categories="HORSE HARNESS GREYHOUND"
          final_source_date=""

          for day_offset in $(seq 0 "$((lookback_days - 1))"); do
            source_epoch="$((start_epoch + day_offset * 86400))"
            source_date="$(TZ=Pacific/Auckland date -d "@${source_epoch}" +%F)"
            final_source_date="$source_date"

            for country in $countries; do
              for category in $categories; do
                echo "Refreshing ${source_date} ${country} ${category}"

                payload="$(
                  jq -nc \
                    --arg category "$category" \
                    --arg country "$country" \
                    --arg from "$source_date" \
                    --arg to "$source_date" \
                    --argjson dryRun "$dry_run" \
                    --argjson force "$force_refresh" \
                    '{
                      categories: [$category],
                      countries: [$country],
                      coverageMode: "all_domestic",
                      dryRun: $dryRun,
                      force: $force,
                      from: $from,
                      rebuildInsights: false,
                      reconcileOutcomes: false,
                      refreshRaceData: true,
                      to: $to
                    }'
                )"

                response_file="$(mktemp)"

                http_status="$(
                  curl --max-time 840 -sS \
                    -o "$response_file" \
                    -w "%{http_code}" \
                    -X POST \
                    -H "content-type: application/json" \
                    -H "x-refresh-token: ${RACE_DAY_REFRESH_ADMIN_TOKEN}" \
                    --data "$payload" \
                    "https://${SUPABASE_PROJECT_REF}.supabase.co/functions/v1/refresh-race-days-and-insights"
                )"

                jq . "$response_file" || cat "$response_file"

                if [ "$http_status" -lt 200 ] || [ "$http_status" -ge 300 ]; then
                  echo "refresh-race-days-and-insights returned HTTP ${http_status} for ${source_date} ${country} ${category}"
                  exit 1
                fi
              done
            done
          done

          echo "Rebuilding insights and reconciling outcomes through ${final_source_date}"

          payload="$(
            jq -nc \
              --arg from "$final_source_date" \
              --arg to "$final_source_date" \
              --argjson dryRun "$dry_run" \
              --argjson force "$force_refresh" \
              '{
                coverageMode: "all_domestic",
                dryRun: $dryRun,
                force: $force,
                from: $from,
                rebuildInsights: true,
                reconcileOutcomes: true,
                refreshRaceData: false,
                to: $to
              }'
          )"

          response_file="$(mktemp)"

          http_status="$(
            curl --max-time 840 -sS \
              -o "$response_file" \
              -w "%{http_code}" \
              -X POST \
              -H "content-type: application/json" \
              -H "x-refresh-token: ${RACE_DAY_REFRESH_ADMIN_TOKEN}" \
              --data "$payload" \
              "https://${SUPABASE_PROJECT_REF}.supabase.co/functions/v1/refresh-race-days-and-insights"
          )"

          jq . "$response_file" || cat "$response_file"

          if [ "$http_status" -lt 200 ] || [ "$http_status" -ge 300 ]; then
            echo "refresh-race-days-and-insights returned HTTP ${http_status} during final aggregate/reconcile step"
            exit 1
          fi
